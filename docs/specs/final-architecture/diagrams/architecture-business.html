<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neural — AI CRO Audit Platform · Business Architecture</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js" charset="utf-8"></script>
<style>
:root{
  --bg:#f7f8fa; --panel:#ffffff; --text:#0f172a; --muted:#64748b;
  --border:#e2e8f0; --accent:#2563eb; --shadow:0 8px 24px rgba(15,23,42,.08);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.55}
header{padding:14px 24px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap}
header .brand h1{font-size:17px;margin:0;font-weight:600}
header .brand p{margin:2px 0 0;color:var(--muted);font-size:12.5px}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:7px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:white;color:var(--text);outline:none}
.toolbar input{width:200px}
.toolbar a{padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:white;color:var(--text);text-decoration:none}
.toolbar a:hover{border-color:var(--accent);color:var(--accent)}
main{display:grid;grid-template-columns:1fr 480px;height:calc(100vh - 76px);min-height:680px}
#diagram{background:white;border-right:1px solid var(--border)}
aside{background:var(--panel);overflow-y:auto;padding:0;border-left:1px solid var(--border)}
aside.empty .placeholder{color:var(--muted);text-align:center;padding:80px 32px;display:flex;flex-direction:column;align-items:center;gap:12px}
.panel-header{padding:20px 24px 14px;border-bottom:1px solid var(--border);position:relative}
.panel-header .layer-pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;color:white;margin-bottom:8px}
.panel-header h2{font-size:18px;margin:0;font-weight:600}
.panel-header .subtitle{color:var(--muted);margin:6px 0 0;font-size:13px}
.panel-header .meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.panel-header .meta span{font-size:11px;padding:2px 8px;border-radius:4px;background:#f1f5f9;color:#475569;border:1px solid var(--border)}
.panel-header .close{position:absolute;top:16px;right:18px;background:none;border:0;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
.panel-body{padding:8px 24px 32px}
.panel-body section{margin:18px 0}
.panel-body section h3{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 6px;font-weight:600}
.panel-body section p{margin:0}
.panel-body section ul{margin:0;padding-left:18px}
.panel-body section li{margin:3px 0}
.panel-body .why{background:#fef9c3;border-left:3px solid #ca8a04;padding:10px 14px;border-radius:6px;font-size:13px;color:#713f12}
.panel-body .example{background:#eff6ff;border-left:3px solid var(--accent);padding:10px 14px;border-radius:6px;font-size:13px;color:#1e3a8a}
.deps{display:flex;flex-direction:column;gap:6px}
.dep{padding:8px 12px;background:#f8fafc;border:1px solid var(--border);border-radius:6px;font-size:12.5px}
.dep .dep-name{font-weight:600;color:#0f172a}
.dep .dep-type{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;background:#e2e8f0;color:#475569;margin-right:6px;text-transform:uppercase}
.dep .dep-reason{color:var(--muted);font-size:12px;margin-top:2px}
.internal{padding:14px;background:#f8fafc;border-radius:8px;border:1px solid var(--border)}
.internal-summary{font-size:12.5px;color:#334155;margin-bottom:10px}
.internal-components{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.internal-component{display:flex;gap:10px;padding:6px 10px;background:white;border:1px solid var(--border);border-radius:5px}
.internal-component .ic-name{font-weight:600;color:#0f172a;font-size:12px;flex-shrink:0;min-width:140px}
.internal-component .ic-role{color:var(--muted);font-size:12px}
.internal-flow{display:flex;flex-direction:column;gap:3px;font-size:12px;color:#475569;font-family:'SF Mono','Monaco',monospace}
.internal-flow .if-step{padding:3px 8px;background:white;border-left:2px solid var(--accent);border-radius:3px}
.connected{display:flex;flex-wrap:wrap;gap:6px}
.connected button{padding:4px 10px;border-radius:6px;background:#f1f5f9;color:var(--text);border:1px solid var(--border);font-size:12px;cursor:pointer}
.connected button:hover{background:#e2e8f0}
.source-files{display:flex;flex-direction:column;gap:4px}
.source-files code{background:#f1f5f9;padding:4px 8px;border-radius:4px;font-size:11.5px;color:#334155;word-break:break-all}
@media (max-width:1100px){main{grid-template-columns:1fr}aside{position:fixed;right:0;top:76px;bottom:0;width:100%;max-width:520px;display:none;box-shadow:var(--shadow)}aside.open{display:block}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Neural — AI CRO Audit Platform</h1>
    <p>Business view · 14 layers · click any component to see what it does · <a href="architecture-engineering.html" style="color:var(--accent);text-decoration:none">⇨ Engineering view</a></p>
  </div>
  <div class="toolbar">
    <input id="search" type="text" placeholder="Search components…">
    <select id="view"><option value="all">All layers</option><option value="business">Stakeholder simplified</option><option value="cro">CRO funnel</option></select>
  </div>
</header>
<main>
  <div id="diagram"></div>
  <aside id="panel" class="empty">
    <div class="placeholder">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.4"><path d="M9 11l3 3 3-3M12 14V3M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"/></svg>
      <div><div style="font-size:14px;font-weight:500;color:#0f172a">Click any component</div><div style="font-size:12.5px;margin-top:4px;color:#64748b">Drawer shows purpose · inputs · outputs · dependencies · internal architecture.</div></div>
    </div>
  </aside>
</main>
<script>
const LAYERS = [
  {id:1,name:"User / Trigger",color:"#0EA5E9"},
  {id:2,name:"Context Capture (§37, Phase 4b)",color:"#475569"},
  {id:3,name:"Orchestration (3-tier)",color:"#2563EB"},
  {id:4,name:"Browser Perception",color:"#06B6D4"},
  {id:5,name:"Dynamic State Coverage",color:"#14B8A6"},
  {id:6,name:"Evidence Packaging",color:"#10B981"},
  {id:7,name:"Heuristics Knowledge",color:"#F59E0B"},
  {id:8,name:"AI Analysis",color:"#7C3AED"},
  {id:9,name:"Insight Generation",color:"#C026D3"},
  {id:10,name:"Reporting & Delivery",color:"#16A34A"},
  {id:11,name:"Storage & Observability",color:"#78716C"},
  {id:12,name:"Human Review",color:"#F97316"},
  {id:13,name:"Learning Loop (v1.1+)",color:"#BE185D"},
  {id:14,name:"Roadmap & Future",color:"#6B7280"},
  {id:15,name:"Safety / Cost / Failure",color:"#DC2626"},
  {id:16,name:"Quality & Adapters",color:"#0891B2"}
];
const layerById=Object.fromEntries(LAYERS.map(l=>[l.id,l]));

const NODES = [
  {id:"T1",label:"Trigger Gateway",layer:1,x:3,y:11.5,
    purpose:"Single entry point that normalizes 5 channels (CLI, MCP read, MCP write, Dashboard, Scheduler) into one AuditRequest.",
    what_happens:["Channel adapter receives the request","Auth Resolver verifies identity (Clerk)","Validator checks shape with Zod","Idempotency check (24h window)","Rate limiter enforces per-client concurrency","Reproducibility snapshot is created BEFORE workflow start","Temporal AuditWorkflow is started"],
    inputs:["URL list","Business type","Audit template","Optional intake (KPI, constraints)"],
    outputs:["Validated AuditRequest","Reproducibility snapshot id","Temporal workflow id"],
    dependencies:[
      {type:"service",name:"Clerk Auth",reason:"Resolves consultant/client identity"},
      {type:"service",name:"Temporal",reason:"Starts the durable AuditWorkflow"},
      {type:"data",name:"Reproducibility Snapshot Builder",reason:"Pins model + prompt + heuristic versions"}
    ],
    internal_architecture:{
      summary:"5 channel adapters + auth + validate + rate limit + snapshot, then start Temporal.",
      components:[
        {name:"CLI Adapter",role:"JSON via stdin"},
        {name:"MCP Read Adapter",role:"Read-only audit retrieval"},
        {name:"MCP Write Adapter",role:"Phase 11+ write actions"},
        {name:"Dashboard Adapter",role:"Clerk session, Phase 6+"},
        {name:"Scheduler Adapter",role:"Temporal Schedules, Phase 13"},
        {name:"Auth Resolver",role:"Verify identity via Clerk"},
        {name:"Validator",role:"Zod schema enforcement"},
        {name:"Idempotency Check",role:"24h dedupe window"},
        {name:"Rate Limiter",role:"Per-client concurrency = 1 default"},
        {name:"Webhook Delivery + DLQ",role:"Outbound with exponential backoff"}
      ],
      internal_flow:["Channel → Auth → Validate → Idempotency → Rate Limit","→ Reproducibility Snapshot (pinned)","→ Temporal AuditWorkflow.start()","→ Webhook ack to caller"]
    },
    why_matters:"One disciplined door for every audit. Predictable cost, reproducible results, no double-runs.",
    example:"A consultant runs `pnpm cro:audit --urls site.com --business-type ecommerce`. Gateway validates, pins versions, starts the durable workflow.",
    connected_to:["C1","O1","E4"],
    source_files:["docs/specs/final-architecture/18-trigger-gateway.md","docs/specs/final-architecture/25-reproducibility.md"]},

  {id:"T2",label:"Discovery Pipeline (7 stages)",layer:1,x:6,y:11.5,
    purpose:"Template-first page discovery — clusters URLs by structural fingerprint, classifies templates, picks representatives.",
    what_happens:["Acquire seeds (sitemap or shallow crawl, 500 URL cap)","Shallow fetch HTML for each","Apply exclusion filter","Cluster by structural fingerprint (HDBSCAN)","Classify templates (1 batched LLM call)","Pick representative pages","Synthesize workflows (funnel paths)"],
    inputs:["Seed URL","AuditRequest.scope.templates","ClientProfile"],
    outputs:["DiscoveryResult: templates[], key_pages[], workflows[], work_queue[]"],
    dependencies:[
      {type:"service",name:"Shallow Fetch",reason:"undici/node-fetch, respects robots.txt, 5s timeout"},
      {type:"service",name:"HDBSCAN clusterer",reason:"Deterministic, no k pre-specified"},
      {type:"service",name:"LLM classifier",reason:"1 batched call, <0.5 confidence → 'other'"}
    ],
    internal_architecture:{
      summary:"7-stage deterministic + 1 LLM call. ~$0.05, 5 min hard cap.",
      components:[
        {name:"Stage 1 · Seed Acquisition",role:"Sitemap parse or seed list"},
        {name:"Stage 2 · Shallow Fetch",role:"Fast HTML pull, robots-aware"},
        {name:"Stage 3 · Exclusion Filter",role:"Drop login/admin/cart-API"},
        {name:"Stage 4 · Template Clustering",role:"HDBSCAN on structural fingerprint (CSS classes excluded)"},
        {name:"Stage 5 · Template Classification",role:"1 LLM batched call, default 'other' if <0.5 confidence"},
        {name:"Stage 6 · Representative Selection",role:"~1 page per template"},
        {name:"Stage 7 · Workflow Synthesis",role:"Funnel path detection per business type"}
      ],
      internal_flow:["Seeds → Fetch → Exclude → Cluster → Classify → Representatives → Workflows","→ work_queue[] feeds AuditGraph"]
    },
    why_matters:"Replaces blind crawling. Bounds cost, surfaces only the pages that matter.",
    example:"site.com → home + 3 PLP + 5 PDP + cart + checkout → 6 templates → 10 representatives + 1 funnel.",
    connected_to:["C1","O1"],
    source_files:["docs/specs/final-architecture/19-discovery-and-templates.md"]},

  {id:"T3",label:"Audit Template Library",layer:1,x:9,y:11.5,
    purpose:"Pre-built audit recipes per business type (defaults persona + page mix + heuristic group).",
    what_happens:["Map business type to default persona","Default heuristic group","Default page templates"],
    inputs:["Business type"],
    outputs:["Template-driven defaults"],
    dependencies:[{type:"data",name:"§09 heuristic groups",reason:"Selects which group applies"}],
    internal_architecture:{
      summary:"Static config table per business archetype.",
      components:[
        {name:"ecommerce template",role:"Shopper persona, e-com heuristics"},
        {name:"saas template",role:"Decision-maker persona, B2B heuristics"},
        {name:"lead-gen template",role:"Service-buyer persona"},
        {name:"content template",role:"Reader persona"}
      ],
      internal_flow:["business_type → template lookup → persona + heuristic_group + page_mix"]
    },
    why_matters:"Removes hand-tuning per audit.",
    example:"'ecommerce' loads shopper persona, e-com heuristic pack, PDP+PLP+Cart page mix.",
    connected_to:["C1"],
    source_files:["docs/specs/final-architecture/19-discovery-and-templates.md"]},

  {id:"C1",label:"ContextProfile (§37)",layer:2,x:6,y:10.3,
    purpose:"Pre-perception context capture — 5 dimensions × {value, source, confidence}, blocking gate on missing required fields.",
    what_happens:["Parse user intake (CLI prompt or dashboard form)","URL pattern + JSON-LD inference","CTA + pricing copy inference","Per-field provenance + confidence scoring","Open-questions emitted if confidence < 0.6","Blocking gate on missing primary_kpi or regulated-vertical constraints"],
    inputs:["AuditRequest","Optional intake form","URL","Optional HTML fetch"],
    outputs:["ContextProfile (immutable, hashed)","open_questions[]","blocking flag"],
    dependencies:[
      {type:"service",name:"undici/node-fetch",reason:"Single HTML inference fetch (NOT Playwright)"},
      {type:"data",name:"JSON-LD parser",reason:"Schema.org type extraction"},
      {type:"data",name:"Reproducibility Snapshot",reason:"Profile hash pinned"}
    ],
    internal_architecture:{
      summary:"5 dimensions, each field carries {value, source, confidence}. Phase 4b MVP. Phase 13b adds Schwartz awareness, decision_style, weight modifiers.",
      components:[
        {name:"Business",role:"archetype, aov_tier, cadence, vertical"},
        {name:"Page",role:"type, funnel_stage, job, is_indexed"},
        {name:"Audience",role:"buyer, awareness_level, decision_style, sophistication"},
        {name:"Traffic",role:"primary_sources, device_priority, mobile_share, geo, locale"},
        {name:"Goal",role:"primary_kpi (REQUIRED), secondary_kpis, baseline, target_lift, constraints"},
        {name:"Inference Pipeline",role:"URL > JSON-LD > pricing > CTA > TLD > magnitude"},
        {name:"Open-Questions Loop",role:"Block audit if blocking=true"}
      ],
      internal_flow:["Intake + URL fetch → 6 inference sources","→ Per-field {value, source, confidence}","→ Confidence ≥0.9 act / 0.6-0.9 flag / <0.6 open_question","→ Blocking? → halt audit_setup"]
    },
    why_matters:"Findings are persona-aware and constraint-aware. Regulated verticals can't ship without compliance constraints.",
    example:"site.com → archetype=B2B-SaaS (0.92, schema_org), primary_kpi=lead_volume (0.6, user-supplied), regulatory=[] (open_question if vertical=fintech).",
    connected_to:["O1","A1"],
    source_files:["docs/specs/final-architecture/37-context-capture-layer.md"]},

  {id:"O1",label:"Trigger → AuditWorkflow Handoff",layer:3,x:2,y:9.1,
    purpose:"Temporal AuditWorkflow.start() boundary — converts validated request into a durable, resumable run.",
    what_happens:["Reads ReproducibilitySnapshot from gateway","Creates audit_runs DB row","Starts AuditWorkflow on Temporal"],
    inputs:["AuditRequest","ReproducibilitySnapshot id","ContextProfile id"],
    outputs:["audit_run_id","Temporal workflow handle"],
    dependencies:[{type:"service",name:"Temporal",reason:"Outer durable orchestration layer"}],
    internal_architecture:{
      summary:"Thin handoff. Temporal owns retries, heartbeats, cancellation.",
      components:[
        {name:"resolveClient activity",role:"Lookup client_id, RLS context"},
        {name:"loadReproducibilitySnapshot activity",role:"Reads pinned versions"},
        {name:"AuditWorkflow.start()",role:"Begin durable run"}
      ],
      internal_flow:["Gateway → resolveClient → loadReproducibilitySnapshot → AuditWorkflow.start()"]
    },
    why_matters:"All retries/resumes/cancellations live in Temporal — no bespoke recovery code.",
    example:"audit_run_id = UUID, Temporal workflow_id = audit-{audit_run_id}.",
    connected_to:["O2"],
    source_files:["docs/specs/final-architecture/27-durable-orchestration.md"]},

  {id:"O2",label:"AuditGraph Outer (§04)",layer:3,x:4.8,y:9.1,
    purpose:"LangGraph outer graph: audit_setup → page_router → cross_page_analyze → audit_complete.",
    what_happens:["audit_setup: build page queue, attach context","page_router: dispatch each page to BrowseGraph + AnalyzeGraph","cross_page_analyze: PageSignals → patterns + consistency + funnel findings (v2.2 NEW)","audit_complete: rollups, exec summary, action plan"],
    inputs:["AuditRequest + ContextProfile + DiscoveryResult"],
    outputs:["Findings, ExecutiveSummary, ActionPlan"],
    dependencies:[
      {type:"service",name:"BrowseGraph subgraph",reason:"Per-page browse"},
      {type:"service",name:"AnalyzeGraph subgraph",reason:"Per-page analysis"},
      {type:"service",name:"WorkflowOrchestrator",reason:"Funnel traversal (Phase 9)"}
    ],
    internal_architecture:{
      summary:"4 outer nodes + 3 routing functions. Wraps two inner subgraphs (browse/analyze). Hard cap 50 pages/audit.",
      components:[
        {name:"audit_setup",role:"Build queue, init AuditState"},
        {name:"page_router",role:"Dispatch to subgraphs per page"},
        {name:"cross_page_analyze",role:"v2.2 NEW: pattern + consistency + funnel findings"},
        {name:"audit_complete",role:"Rollups + ExecSummary + ActionPlan + finalize"},
        {name:"routePageRouter",role:"Choose next page or proceed"},
        {name:"routeAfterBrowse",role:"Continue or skip page"},
        {name:"routeAfterAnalyze",role:"Continue or escalate"}
      ],
      internal_flow:["audit_setup → page_router → (BrowseGraph + AnalyzeGraph) → page_router (next)","→ cross_page_analyze → audit_complete"]
    },
    why_matters:"One predictable graph for every audit. Cross-page findings happen in their own dedicated step.",
    example:"6-page audit: setup → page 1..6 → cross-page → complete.",
    connected_to:["O3","O4","X1"],
    source_files:["docs/specs/final-architecture/04-orchestration.md"]},

  {id:"O3",label:"BrowseGraph Subgraph (§06)",layer:3,x:7.5,y:9.1,
    purpose:"Per-page browse via 10-node LangGraph. MVP runs 5 nodes; full graph adds memory + safety_gate + reflect + HITL.",
    what_happens:["MVP path: perceive → reason → act → verify → output","Full path adds: classify_task, load_memory, safety_gate, reflect, hitl"],
    inputs:["URL", "Browse mode (A/B/C)"],
    outputs:["PageStateModel + screenshots + verified actions"],
    dependencies:[
      {type:"service",name:"MCP Tool Server",reason:"28 tools available"},
      {type:"service",name:"Verification Engine",reason:"Confirms each action effect"},
      {type:"service",name:"Safety Controls",reason:"ActionClassifier on every call"}
    ],
    internal_architecture:{
      summary:"10 nodes, 8 internal layers, 3 modes. MVP defaults to Mode B (Guided Agent, ~$0.10/step). Multiplicative confidence decay.",
      components:[
        {name:"perceive",role:"Capture PageStateModel (MVP)"},
        {name:"reason",role:"LLM picks next action (MVP)"},
        {name:"act",role:"Execute MCP tool call (MVP)"},
        {name:"verify",role:"Confirm via 1 of 9 strategies (MVP)"},
        {name:"output",role:"Emit result + cleanup (MVP)"},
        {name:"classify_task",role:"Deferred — task routing"},
        {name:"load_memory",role:"Deferred — 4 memory types"},
        {name:"safety_gate",role:"Deferred — explicit gate (inline in MVP)"},
        {name:"reflect",role:"Deferred — replan on failure"},
        {name:"hitl",role:"Deferred — agent_request_human"}
      ],
      internal_flow:["perceive → reason → act → verify → output","Modes: A Deterministic ($0) | B Guided ($0.10/step, MVP default) | C Computer-Use ($0.30/step)","Domain Circuit Breaker: 3 fails → 1hr block","Anti-bot: ghost-cursor + Gaussian typing"]
    },
    why_matters:"Same 5-node MVP graph evolves to 10-node full graph without rewrite. Safety enforced at graph level, not LLM discretion.",
    example:"Loads /checkout in Mode B; perceive → reason picks browser_click on CTA → act → verify (element_appears) → output.",
    connected_to:["B1","V1","D1","E1"],
    source_files:["docs/specs/final-architecture/06-browse-mode.md","docs/specs/final-architecture/08-tool-manifest.md"]},

  {id:"O4",label:"AnalyzeGraph Subgraph (§07)",layer:3,x:9.5,y:9.1,
    purpose:"Per-page 5-step pipeline: deep_perceive → evaluate → self_critique → ground → annotate_and_store.",
    what_happens:["DeepPerceive enriches the PageStateModel for analysis","Evaluate runs heuristic shortlist via LLM (temp=0)","Self-Critique runs separate persona (~30% FP reduction)","Ground runs 9 deterministic GR rules (MVP)","Annotate attaches evidence + Store persists"],
    inputs:["PageStateModel","Filtered heuristics","ContextProfile","Persona"],
    outputs:["Grounded findings","RejectedFindings (silent)"],
    dependencies:[
      {type:"service",name:"LLM Adapter",reason:"Anthropic Claude Sonnet 4 (primary), GPT-4o (fallback)"},
      {type:"service",name:"TemperatureGuard",reason:"R10 enforced — temp=0 on evaluate/critique"},
      {type:"service",name:"Pre-call Budget Gate",reason:"Skip if budget tight"}
    ],
    internal_architecture:{
      summary:"5 nodes + AnalysisState + CostTracker + PerceptionQualityGate + PageSignals emission.",
      components:[
        {name:"DeepPerceive",role:"Persona-aware re-read of page"},
        {name:"Evaluate",role:"LLM applies each heuristic (temp=0)"},
        {name:"SelfCritique",role:"Separate persona LLM challenges drafts"},
        {name:"Ground",role:"9 GR rules: GR-001..GR-008 + GR-012"},
        {name:"Annotate + Store",role:"Sharp pin overlay + DB persist"},
        {name:"PerceptionQualityScorer",role:"Gate: <0.3 skip, 0.3-0.6 partial, ≥0.6 full"}
      ],
      internal_flow:["DeepPerceive → Evaluate → SelfCritique → Ground → Annotate+Store","Pre-call Budget Gate before each LLM call","TemperatureGuard wraps every LLM call"]
    },
    why_matters:"Three-layer hallucination filter (LLM → critique → grounding) yields findings that hold up in client meetings.",
    example:"Evaluate flags 'CTA below fold mobile' → SelfCritique keeps it → Ground confirms via GR-002 → Annotate adds boxed screenshot.",
    connected_to:["A1","S3"],
    source_files:["docs/specs/final-architecture/07-analyze-mode.md"]},

  {id:"B1",label:"MCP Tool Server (28 tools)",layer:4,x:2,y:7.9,
    purpose:"Curated tool catalog: 23 browse + 5 analysis. Every call is safety-classified before execution.",
    what_happens:["Tool call from LLM agent","ActionClassifier assigns class (safe/caution/sensitive/blocked)","DomainPolicy + NavigationGuard cross-check","Execute via Playwright","Verify outcome (V1)"],
    inputs:["Tool call (typed via Zod)"],
    outputs:["Typed tool result"],
    dependencies:[
      {type:"service",name:"Playwright",reason:"Browser engine"},
      {type:"service",name:"ActionClassifier",reason:"Deterministic safety classification"},
      {type:"service",name:"VerifyEngine",reason:"Confirms action effect"}
    ],
    internal_architecture:{
      summary:"4 navigation + 3 perception + 8 interaction + 1 tab + 2 data + 2 discovery + 2 control + 1 HITL + 1 restricted (browse) + 5 analysis tools.",
      components:[
        {name:"Navigation (4)",role:"navigate, go_back, go_forward, reload"},
        {name:"Perception (3)",role:"get_state, screenshot, get_metadata"},
        {name:"Interaction (8)",role:"click, click_coords, type, scroll, select, hover, press_key, upload"},
        {name:"Tab Management (1)",role:"tab_manage"},
        {name:"Data (2)",role:"extract, download"},
        {name:"Discovery (2)",role:"find_by_text, get_network"},
        {name:"Control (2)",role:"wait_for, agent_complete"},
        {name:"HITL (1)",role:"agent_request_human (deferred)"},
        {name:"Restricted (1)",role:"browser_evaluate (sandboxed, blocked on untrusted)"},
        {name:"Analysis (5)",role:"page_get_element_info, page_get_performance, page_screenshot_full, page_annotate_screenshot, page_analyze (single-call 15-section)"}
      ],
      internal_flow:["Tool call → ActionClassifier → DomainPolicy → NavigationGuard → execute → VerifyEngine"]
    },
    why_matters:"Agent's whole power surface in one place. Safety classification is graph-level, not LLM-discretionary.",
    example:"`browser_click` on PDP CTA: classified 'caution' → policy OK → execute via ghost-cursor → verify element_appears.",
    connected_to:["O3","V1","SC1"],

function hex2rgba(h,a){h=h.replace("#","");const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);return `rgba(${r},${g},${b},${a})`}

function buildBands(lids){
  const shapes=[],ann=[];
  lids.forEach(lid=>{
    const layer=layerById[lid];if(!layer)return;
    const ns=NODES.filter(n=>n.layer===lid);if(!ns.length)return;
    const xs=ns.map(n=>n.x),ys=ns.map(n=>n.y);
    let xMin=Math.min(...xs)-0.7,xMax=Math.max(...xs)+0.7;
    const yMin=Math.min(...ys)-0.45,yMax=Math.max(...ys)+0.45;
    if(lid===11){xMin=12.7;xMax=14.3}
    if(lid===15||lid===16){xMin=-2.7;xMax=-1.3}
    if(lid===7){xMin=-1.3;xMax=1.3}
    shapes.push({type:"rect",xref:"x",yref:"y",x0:xMin,x1:xMax,y0:yMin,y1:yMax,fillcolor:hex2rgba(layer.color,0.06),line:{color:hex2rgba(layer.color,0.20),width:1},layer:"below"});
    ann.push({x:xMin+0.05,y:yMax-0.05,xref:"x",yref:"y",text:`<b>${layer.id}. ${layer.name}</b>`,showarrow:false,xanchor:"left",yanchor:"top",font:{size:10.5,color:layer.color}});
  });
  return {shapes,annotations:ann};
}

function buildArrows(visIds){
  return EDGES.filter(e=>visIds.has(e.from)&&visIds.has(e.to)).map(e=>{
    const s=nodeById[e.from],t=nodeById[e.to],ft=FLOW_TYPES[e.flow_type];
    return {x:t.x,y:t.y,ax:s.x,ay:s.y,xref:"x",yref:"y",axref:"x",ayref:"y",showarrow:true,arrowhead:3,arrowsize:1,arrowwidth:ft.width,arrowcolor:ft.color,opacity:e.flow_type==='infra'?0.4:0.85,standoff:14,startstandoff:14};
  });
}

function buildTrace(visNodes){
  const keyIds=["O2","O3","O4","B1","V1","H1","A2","A4","R1","I3","P1","S1","SC1","SC4","Q1"];
  return {type:"scatter",mode:"markers+text",x:visNodes.map(n=>n.x),y:visNodes.map(n=>n.y),text:visNodes.map(n=>n.label),customdata:visNodes.map(n=>n.id),textposition:"middle center",textfont:{size:10,color:"#0f172a"},marker:{size:visNodes.map(n=>keyIds.includes(n.id)?64:50),color:visNodes.map(n=>hex2rgba(layerById[n.layer].color,0.18)),line:{width:visNodes.map(n=>keyIds.includes(n.id)?2.5:1.5),color:visNodes.map(n=>layerById[n.layer].color)},symbol:"square"},hovertemplate:"<b>%{text}</b><br><i>click for full details</i><extra></extra>",hoverlabel:{bgcolor:"white",bordercolor:"#cbd5e1"}};
}

function render(viewKey){
  const view=VIEWS[viewKey]||VIEWS.all;
  const visLayers=new Set(view.layers);
  const visNodes=NODES.filter(n=>visLayers.has(n.layer));
  const visIds=new Set(visNodes.map(n=>n.id));
  const bands=buildBands(view.layers);
  const arrows=buildArrows(visIds);
  const trace=buildTrace(visNodes);
  const layout={margin:{t:20,l:20,r:20,b:20},showlegend:false,plot_bgcolor:"white",paper_bgcolor:"white",xaxis:{visible:false,range:[-3,15.5],fixedrange:false,showgrid:false,zeroline:false},yaxis:{visible:false,range:[-3.5,12.5],fixedrange:false,showgrid:false,zeroline:false,scaleanchor:"x",scaleratio:0.5},shapes:bands.shapes,annotations:[...bands.annotations,...arrows],dragmode:"pan",hovermode:"closest"};
  Plotly.newPlot(PLOT_DIV,[trace],layout,{responsive:true,displaylogo:false,scrollZoom:true,modeBarButtonsToRemove:["lasso2d","select2d","autoScale2d"]});
  PLOT_DIV.removeAllListeners?.("plotly_click");
  PLOT_DIV.on("plotly_click",e=>{const id=e.points?.[0]?.customdata;if(id)showDetail(id)});
}

function showDetail(id){
  const n=nodeById[id];if(!n)return;
  const layer=layerById[n.layer];
  const inbound=EDGES.filter(e=>e.to===id).map(e=>e.from);
  const outbound=EDGES.filter(e=>e.from===id).map(e=>e.to);

  const depsHTML = (n.dependencies||[]).map(d=>`
    <div class="dep">
      <div><span class="dep-type">${d.type}</span><span class="dep-name">${d.name}</span></div>
      <div class="dep-reason">${d.reason}</div>
    </div>`).join("");

  const ia=n.internal_architecture||{};
  const compsHTML=(ia.components||[]).map(c=>`
    <div class="internal-component">
      <div class="ic-name">${c.name}</div>
      <div class="ic-role">${c.role}</div>
    </div>`).join("");
  const flowHTML=(ia.internal_flow||[]).map(f=>`<div class="if-step">${f}</div>`).join("");

  PANEL.classList.remove("empty");
  PANEL.innerHTML=`
    <div class="panel-header">
      <button class="close" onclick="closeDetail()">×</button>
      <span class="layer-pill" style="background:${layer.color}">${layer.id}. ${layer.name}</span>
      <h2>${n.label}</h2>
      <p class="subtitle">${n.purpose}</p>
      <div class="meta"><span>id: ${n.id}</span></div>
    </div>
    <div class="panel-body">
      <section><h3>Why this matters</h3><div class="why">${n.why_matters}</div></section>
      <section><h3>Internal architecture</h3>
        <div class="internal">
          <div class="internal-summary">${ia.summary||""}</div>
          ${compsHTML?`<div class="internal-components">${compsHTML}</div>`:""}
          ${flowHTML?`<div class="internal-flow">${flowHTML}</div>`:""}
        </div>
      </section>
      <section><h3>What happens</h3><ul>${(n.what_happens||[]).map(s=>`<li>${s}</li>`).join("")}</ul></section>
      <section><h3>Inputs</h3><ul>${(n.inputs||[]).map(s=>`<li>${s}</li>`).join("")}</ul></section>
      <section><h3>Outputs</h3><ul>${(n.outputs||[]).map(s=>`<li>${s}</li>`).join("")}</ul></section>
      <section><h3>Dependencies</h3>${depsHTML?`<div class="deps">${depsHTML}</div>`:"<p style='color:var(--muted);font-size:12.5px'>None.</p>"}</section>
      <section><h3>Real example</h3><div class="example">${n.example}</div></section>
      ${(inbound.length||outbound.length)?`<section><h3>Connected components</h3><div class="connected">
        ${inbound.map(i=>`<button onclick="showDetail('${i}')" title="Upstream">← ${nodeById[i]?.label||i}</button>`).join("")}
        ${outbound.map(o=>`<button onclick="showDetail('${o}')" title="Downstream">${nodeById[o]?.label||o} →</button>`).join("")}
      </div></section>`:""}
      <section><h3>Source specs</h3><div class="source-files">${(n.source_files||[]).map(f=>`<code>${f}</code>`).join("")}</div></section>
    </div>`;
  PANEL.scrollTop=0;
}

function closeDetail(){
  PANEL.classList.add("empty");
  PANEL.innerHTML=`<div class="placeholder">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.4"><path d="M9 11l3 3 3-3M12 14V3M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"/></svg>
    <div><div style="font-size:14px;font-weight:500;color:#0f172a">Click any component</div><div style="font-size:12.5px;margin-top:4px;color:#64748b">Drawer shows purpose · inputs · outputs · dependencies · internal architecture.</div></div>
  </div>`;
}

document.getElementById("view").addEventListener("change",e=>render(e.target.value));
document.getElementById("search").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase().trim();
  if(!q){render(document.getElementById("view").value);return}
  const hit=NODES.find(n=>n.label.toLowerCase().includes(q)||n.id.toLowerCase()===q);
  if(hit)showDetail(hit.id);
});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape")closeDetail();
  if(e.key==="/"){const s=document.getElementById("search");if(document.activeElement!==s){e.preventDefault();s.focus()}}
});
