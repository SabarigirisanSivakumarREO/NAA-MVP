<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neural — Engineering Architecture (33 layers · ~152 nodes)</title>
<style>
:root{
  --bg:#f7f8fa;--panel:#ffffff;--text:#0f172a;--muted:#64748b;
  --border:#e2e8f0;--accent:#2563eb;
  --c-control:#1F2937;--c-data:#2563EB;--c-evidence:#0D9488;
  --c-analysis:#7C3AED;--c-report:#16A34A;--c-feedback:#F97316;
  --c-infra:#9CA3AF;--c-safety:#DC2626;
  --part-a:#2563EB;--part-b:#7C3AED;--part-c:#C026D3;--part-d:#16A34A;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.55}
header{position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--border);padding:12px 24px;z-index:50;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap}
header .brand h1{font-size:16px;margin:0;font-weight:600}
header .brand p{margin:1px 0 0;color:var(--muted);font-size:12px}
header .brand .progress{font-weight:600;color:var(--accent)}
header nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
header nav input{padding:6px 11px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:white;width:200px;outline:none}
header nav input:focus{border-color:var(--accent)}
header nav a,header nav .jump{padding:6px 11px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text);text-decoration:none;background:white;cursor:pointer}
header nav a:hover,header nav .jump:hover{border-color:var(--accent);color:var(--accent)}
header nav .jump-group{display:flex;gap:2px;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:white}
header nav .jump-group .jump{border:0;border-radius:0;padding:6px 10px}
header nav .jump-group .jump:not(:last-child){border-right:1px solid var(--border)}

main{padding:0;height:calc(100vh - 90px);overflow:hidden;display:grid;grid-template-columns:1fr 0;transition:grid-template-columns .25s}
main.drawer-open{grid-template-columns:1fr 480px}
#diagram-wrap{overflow:auto;background:white;position:relative}
svg#diagram{display:block;background:white}

/* SVG element styles */
.part-band{fill:#fafbfd;stroke:#e2e8f0;stroke-width:1}
.part-header-bar{cursor:pointer}
.part-header-text{font-weight:700;font-size:14px;fill:#1e293b;dominant-baseline:middle}
.part-scope-text{font-size:11px;fill:#64748b;dominant-baseline:middle}
.part-stripe{rx:3;ry:3}

.layer-row-bg{fill:transparent}
.layer-label{font-size:11.5px;font-weight:600;fill:#334155;dominant-baseline:middle}
.layer-sublabel{font-size:10px;fill:#94a3b8;dominant-baseline:middle}
.layer-separator{stroke:#f1f5f9;stroke-width:1}
.layer-empty-hint{font-size:11px;fill:#cbd5e1;font-style:italic;text-anchor:middle}

/* Cross-cutting layer label - red tinted */
.layer-label.cross-cutting{fill:#dc2626}
.layer-sublabel.cross-cutting{fill:#fca5a5}
.cross-cutting-badge{font-size:9px;fill:#dc2626;font-weight:600}

/* Future-extending layer marker (Layers 25/26/27) */
.future-extending-marker{font-size:9px;fill:#a16207;font-weight:600}

/* Roadmap layer (Layer 33) styling */
.roadmap-layer-bg{fill:#fef3c7;stroke:#fcd34d;stroke-width:1;stroke-dasharray:6 4;rx:6;ry:6}
.roadmap-badge{font-size:11px;fill:#92400e;font-weight:600}

/* Node */
.node-rect{stroke-width:1.5;rx:6;ry:6;cursor:pointer;transition:.15s}
.node-rect:hover{filter:drop-shadow(0 4px 8px rgba(15,23,42,.18))}
.node-rect.roadmap{stroke-dasharray:5 3}
.node-label{font-size:11.5px;font-weight:600;fill:#0f172a;text-anchor:middle;pointer-events:none}
.node-id{font-size:9px;fill:#64748b;text-anchor:start;pointer-events:none;font-family:'SF Mono','Consolas',monospace}
.node-roadmap-icon{font-size:10px;text-anchor:end;pointer-events:none}

/* Edges */
.edge-path{fill:none;stroke-width:1.5;pointer-events:none}
.edge-path.flow-control{stroke:var(--c-control)}
.edge-path.flow-data{stroke:var(--c-data)}
.edge-path.flow-evidence{stroke:var(--c-evidence)}
.edge-path.flow-analysis{stroke:var(--c-analysis);stroke-width:2}
.edge-path.flow-report{stroke:var(--c-report);stroke-width:2}
.edge-path.flow-feedback{stroke:var(--c-feedback);stroke-dasharray:5 4}
.edge-path.flow-infra{stroke:var(--c-infra);stroke-dasharray:2 3;opacity:.6}
.edge-path.flow-safety{stroke:var(--c-safety)}

.legend-box{fill:white;stroke:var(--border);stroke-width:1;rx:6;ry:6}

/* Drawer (identical to business view) */
aside#drawer{background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:0}
aside#drawer.empty .placeholder{padding:80px 32px;text-align:center;color:var(--muted)}
.panel-header{padding:18px 22px 12px;border-bottom:1px solid var(--border);position:relative}
.panel-header .layer-pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:10.5px;font-weight:600;color:white;margin-bottom:6px}
.panel-header h2{font-size:17px;margin:0;font-weight:600}
.panel-header .subtitle{color:var(--muted);margin:5px 0 0;font-size:12.5px}
.panel-header .meta{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.panel-header .meta span{font-size:10.5px;padding:2px 7px;border-radius:4px;background:#f1f5f9;color:#475569;border:1px solid var(--border);font-family:'SF Mono','Consolas',monospace}
.panel-header .close{position:absolute;top:14px;right:16px;background:none;border:0;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
.panel-body{padding:6px 22px 28px}
.panel-body section{margin:16px 0}
.panel-body section h3{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 6px;font-weight:600}
.panel-body ul{margin:0;padding-left:16px}
.panel-body li{margin:2px 0;font-size:13px}
.panel-body .why{background:#fef9c3;border-left:3px solid #ca8a04;padding:9px 12px;border-radius:5px;font-size:12.5px;color:#713f12}
.panel-body .example{background:#eff6ff;border-left:3px solid var(--accent);padding:9px 12px;border-radius:5px;font-size:12.5px;color:#1e3a8a}
.panel-body .future-extending{background:#fff7ed;border-left:3px solid #f97316;padding:9px 12px;border-radius:5px;font-size:12.5px;color:#9a3412;margin-top:8px}
.panel-body .future-extending b{color:#7c2d12}
.panel-body .roadmap-warning{background:#fef3c7;border-left:3px solid #d97706;padding:9px 12px;border-radius:5px;font-size:12.5px;color:#78350f}
.deps{display:flex;flex-direction:column;gap:5px}
.dep{padding:7px 10px;background:#f8fafc;border:1px solid var(--border);border-radius:5px;font-size:12px}
.dep .dep-name{font-weight:600}
.dep .dep-type{display:inline-block;font-size:9.5px;padding:1px 5px;border-radius:3px;background:#e2e8f0;color:#475569;margin-right:5px;text-transform:uppercase;font-family:'SF Mono','Consolas',monospace}
.dep .dep-reason{color:var(--muted);font-size:11.5px;margin-top:2px}
.internal{padding:12px;background:#f8fafc;border-radius:6px;border:1px solid var(--border)}
.internal-summary{font-size:12px;color:#334155;margin-bottom:8px}
.internal-components{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.internal-component{display:flex;gap:10px;padding:5px 9px;background:white;border:1px solid var(--border);border-radius:4px}
.internal-component .ic-name{font-weight:600;font-size:11.5px;flex-shrink:0;min-width:130px}
.internal-component .ic-role{color:var(--muted);font-size:11.5px}
.internal-flow{display:flex;flex-direction:column;gap:2px;font-size:11.5px;color:#475569;font-family:'SF Mono','Consolas',monospace}
.internal-flow .if-step{padding:2px 7px;background:white;border-left:2px solid var(--accent);border-radius:2px}
.connected{display:flex;flex-wrap:wrap;gap:5px}
.connected button{padding:3px 9px;border-radius:5px;background:#f1f5f9;border:1px solid var(--border);font-size:11.5px;cursor:pointer;color:var(--text)}
.connected button:hover{background:#e2e8f0}
.source-files{display:flex;flex-direction:column;gap:3px}
.source-files code{background:#f1f5f9;padding:3px 7px;border-radius:3px;font-size:11px;color:#334155;word-break:break-all}
</style>
</head>

/* =========================================================
   LAYOUT CONSTANTS
========================================================= */
const LAYOUT = {
  canvasW:  1480,
  // left margin: layer label column
  layerLabelW: 170, layerLabelPad: 14,
  // main area for nodes
  mainStartX: 182, mainEndX: 1440,
  // node sizing (compact for engineering view density)
  nodeW: 158, nodeH: 50, nodeGapX: 22, nodeGapY: 8,
  // layer band — minimum height; grows for layers with many nodes (multi-row)
  layerHMin: 70,
  // explicit gutter between layers (edge routing)
  gutterH: 28,
  // part band sizing
  partHeaderH: 42, partHeaderGap: 8,
  partGap: 22, // between Parts
  // top/bottom padding
  topPad: 14, bottomPad: 30,
  // fan-out spacing on node edges (multi-edge sources/targets)
  fanSpacing: 14
};

function nodesPerRow(){
  return Math.floor((LAYOUT.mainEndX - LAYOUT.mainStartX + LAYOUT.nodeGapX) / (LAYOUT.nodeW + LAYOUT.nodeGapX));
}
function layerBandHeight(layerId){
  const count = NODES.filter(n=>n.layer===layerId).length;
  if (count === 0) return LAYOUT.layerHMin;
  const perRow = nodesPerRow();
  const rows = Math.ceil(count / perRow);
  return Math.max(LAYOUT.layerHMin, rows * LAYOUT.nodeH + (rows-1) * LAYOUT.nodeGapY + 20);
}

/* =========================================================
   LAYOUT COMPUTATION
   Layout grammar:
     topPad
     for each Part:
       partHeader
       partHeaderGap
       topGutter (above first layer in Part)
       for each Layer in Part:
         layerBand (variable height)
         gutterBelowLayer
       partGap
     bottomPad
========================================================= */
function computePositions(){
  const L = LAYOUT;
  const positions = {};
  const partOrder = ["A","B","C","D"];
  let y = L.topPad;

  partOrder.forEach((partKey, pIdx)=>{
    const partLayers = LAYERS.filter(l=>l.part===partKey);
    if (!partLayers.length) return;

    // Part header
    positions[`__partHeader_${partKey}`] = {x:8, y:y, w:L.canvasW-16, h:L.partHeaderH};
    y += L.partHeaderH + L.partHeaderGap;

    // Top gutter for this Part
    positions[`__gutter_top_part${partKey}`] = {y:y, h:L.gutterH, mid:y + L.gutterH/2};
    y += L.gutterH;

    // Track Part band start for background drawing
    const partBandStart = positions[`__partHeader_${partKey}`].y;

    partLayers.forEach((layer, lIdx)=>{
      const layerY = y;
      const bandH = layerBandHeight(layer.id);

      // Place nodes within this layer (multi-row if needed)
      const nodesInLayer = NODES.filter(n=>n.layer===layer.id);
      const perRow = nodesPerRow();
      const rows = Math.max(1, Math.ceil(nodesInLayer.length / perRow));
      const rowsActual = Math.min(rows, nodesInLayer.length); // for height
      nodesInLayer.forEach((n, i)=>{
        const row = Math.floor(i / perRow);
        const col = i % perRow;
        const colsThisRow = (row === rows-1) ? nodesInLayer.length - row*perRow : perRow;
        const totalRowW = colsThisRow * L.nodeW + (colsThisRow-1) * L.nodeGapX;
        const startX = L.mainStartX + ((L.mainEndX - L.mainStartX) - totalRowW) / 2;
        const yWithin = layerY + 10 + row * (L.nodeH + L.nodeGapY);
        positions[n.id] = {
          x: startX + col*(L.nodeW + L.nodeGapX),
          y: yWithin,
          w: L.nodeW, h: L.nodeH,
          layerY: layerY, layerH: bandH,
          layerKey: `${partKey}_${layer.id}`,
          layerColumn: col, layerRow: row,
          part: partKey,
          is_roadmap: !!n.is_roadmap
        };
      });

      positions[`__layer_${partKey}_${layer.id}`] = {
        y: layerY, h: bandH, layerNum: layer.id, layerName: layer.name,
        cross_cutting: !!layer.cross_cutting,
        future_extending: !!layer.future_extending,
        is_roadmap: !!layer.is_roadmap,
        part: partKey
      };
      y += bandH;

      // Gutter below layer
      positions[`__gutter_below_${partKey}_${layer.id}`] = {y:y, h:L.gutterH, mid:y + L.gutterH/2};
      y += L.gutterH;
    });

    // Part band background extent
    positions[`__partBand_${partKey}`] = {x:6, y:partBandStart, w:L.canvasW-12, h:y - partBandStart};

    // Inter-Part gap (skip after last)
    if (pIdx < partOrder.length-1) y += L.partGap;
  });

  positions.__totalH = y + L.bottomPad;

  // ---- Edge metadata (fan-out + lane allocation) ----
  const exits = {}, entries = {};
  NODES.forEach(n=>{
    exits[n.id]   = {right:[], bottom:[], left:[], top:[]};
    entries[n.id] = {left:[], top:[], right:[], bottom:[]};
  });
  EDGES.forEach((e, idx)=>{
    const s = positions[e.from], t = positions[e.to];
    if(!s || !t) return;
    exits[e.from][inferExitSide(s, t)].push(idx);
    entries[e.to][inferEntrySide(s, t)].push(idx);
  });
  positions.__exits = exits;
  positions.__entries = entries;

  // Lane allocation per gutter
  const traffic = {};
  EDGES.forEach((e, idx)=>{
    const s = positions[e.from], t = positions[e.to];
    if(!s || !t) return;
    horizontalUsage(e, s, t, positions).forEach(u=>{
      if(!traffic[u.gutterKey]) traffic[u.gutterKey] = [];
      traffic[u.gutterKey].push({edgeIdx:idx, dir:u.dir, sortKey:u.sortKey});
    });
  });
  const lanes = {};
  Object.keys(traffic).forEach(gKey=>{
    const gutter = positions[gKey]; if(!gutter) return;
    const list = traffic[gKey];
    const rightward = list.filter(x=>x.dir==="right").sort((a,b)=>a.sortKey - b.sortKey);
    const leftward  = list.filter(x=>x.dir==="left").sort((a,b)=>a.sortKey - b.sortKey);
    rightward.forEach((x,i)=>{
      const laneY = gutter.y + 6 + (i % 4) * 5;
      if(!lanes[x.edgeIdx]) lanes[x.edgeIdx] = {};
      lanes[x.edgeIdx][gKey] = laneY;
    });
    leftward.forEach((x,i)=>{
      const laneY = gutter.y + gutter.h - 6 - (i % 4) * 5;
      if(!lanes[x.edgeIdx]) lanes[x.edgeIdx] = {};
      lanes[x.edgeIdx][gKey] = laneY;
    });
  });
  positions.__lanes = lanes;

  return positions;
}

/* =========================================================
   EDGE ROUTING (no side rail — main canvas only)
========================================================= */
function inferExitSide(s, t){
  if (s.layerKey === t.layerKey) return "right";
  if (s.layerY < t.layerY) return "bottom";
  return "top";
}
function inferEntrySide(s, t){
  if (s.layerKey === t.layerKey) return "left";
  if (s.layerY < t.layerY) return "top";
  return "bottom";
}
function sideExitPoint(node, side, idx, total){
  const L = LAYOUT;
  const span = (total > 1) ? Math.min((total-1) * L.fanSpacing, node.w * 0.7) : 0;
  const offset = (total > 1) ? -span/2 + idx * (span / (total-1)) : 0;
  switch(side){
    case "right":  return {x: node.x + node.w, y: node.y + node.h/2 + offset};
    case "left":   return {x: node.x,           y: node.y + node.h/2 + offset};
    case "top":    return {x: node.x + node.w/2 + offset, y: node.y};
    case "bottom": return {x: node.x + node.w/2 + offset, y: node.y + node.h};
  }
}
function gutterAboveKeyOf(t, positions){
  // Returns the gutter key just ABOVE target's layer
  // = "below_<prev_layer>" if prev exists in same Part, else "top_part<X>"
  const layerKey = t.layerKey; // e.g. "A_3"
  const [partKey, layerNumStr] = layerKey.split("_");
  const layerNum = parseInt(layerNumStr,10);
  const partLayers = LAYERS.filter(l=>l.part===partKey);
  const idx = partLayers.findIndex(l=>l.id===layerNum);
  if (idx <= 0) return `top_part${partKey}`;
  const prev = partLayers[idx-1];
  return `below_${partKey}_${prev.id}`;
}
function horizontalUsage(e, s, t, positions){
  const out = [];
  if (s.layerKey === t.layerKey){
    const adjacent = Math.abs((s.x + s.w) - t.x) < (LAYOUT.nodeGapX + 8) && t.x > s.x;
    if (adjacent) return [];
    out.push({gutterKey:`__gutter_below_${s.layerKey}`, dir: t.x > s.x ? "right" : "left", sortKey: Math.min(s.x, t.x)});
    return out;
  }
  if (s.layerY < t.layerY){
    out.push({gutterKey:`__gutter_below_${s.layerKey}`, dir: t.x > s.x ? "right" : "left", sortKey: Math.min(s.x, t.x)});
    return out;
  }
  out.push({gutterKey:`__gutter_below_${t.layerKey}`, dir: t.x > s.x ? "right" : "left", sortKey: Math.min(s.x, t.x)});
  return out;
}
function edgePath(s, t, edgeIdx, positions, sId, tId){
  const L = LAYOUT;
  const exitSide  = inferExitSide(s, t);
  const entrySide = inferEntrySide(s, t);
  const exitArr  = positions.__exits[sId][exitSide];
  const entryArr = positions.__entries[tId][entrySide];
  const sExitPos  = sideExitPoint(s, exitSide,  exitArr.indexOf(edgeIdx),  exitArr.length);
  const tEntryPos = sideExitPoint(t, entrySide, entryArr.indexOf(edgeIdx), entryArr.length);

  const laneFor = (gutterKey)=>{
    const lane = positions.__lanes?.[edgeIdx]?.[gutterKey];
    if (lane !== undefined) return lane;
    return positions[gutterKey]?.mid;
  };

  if (s.layerKey === t.layerKey){
    const adjacent = Math.abs((s.x + s.w) - t.x) < (L.nodeGapX + 8) && t.x > s.x;
    if (adjacent){
      return `M ${s.x + s.w} ${s.y + s.h/2} H ${t.x}`;
    }
    const gutterKey = `__gutter_below_${s.layerKey}`;
    const gy = laneFor(gutterKey);
    const sCy = s.y + s.h/2, tCy = t.y + t.h/2;
    const exitX = s.x + s.w + 6, entryX = t.x - 6;
    return `M ${s.x + s.w} ${sCy} H ${exitX} V ${gy} H ${entryX} V ${tCy} H ${t.x}`;
  }
  if (s.layerY < t.layerY){
    const gutterKey = `__gutter_below_${s.layerKey}`;
    const gy = laneFor(gutterKey);
    return `M ${sExitPos.x} ${sExitPos.y} V ${gy} H ${tEntryPos.x} V ${tEntryPos.y}`;
  }
  // Inter-layer bottom-up (rare)
  const gutterKey = `__gutter_below_${t.layerKey}`;
  const gy = laneFor(gutterKey);
  return `M ${sExitPos.x} ${s.y} V ${gy} H ${tEntryPos.x} V ${t.y + t.h}`;
}

/* =========================================================
   RENDER
========================================================= */
function render(){
  const svg = document.getElementById("diagram");
  svg.innerHTML = `
    <defs>
      ${["control","data","analysis","infra","safety","evidence","report","feedback"].map(ft=>`
        <marker id="arrow-${ft}" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="${getCSS('--c-'+ft)}"/>
        </marker>
      `).join("")}
    </defs>
  `;

  const pos = computePositions();

  // --- Part bands + headers (with anchor for jump links) ---
  ["A","B","C","D"].forEach(partKey=>{
    const band = pos[`__partBand_${partKey}`];
    const head = pos[`__partHeader_${partKey}`];
    if (!band || !head) return;
    const meta = PART_META[partKey];

    // Anchor for jump-to-Part nav
    appendSVG(svg, `<a href="#part-${partKey}"><rect id="part-${partKey}" x="${band.x}" y="${band.y}" width="${band.w}" height="${band.h}" fill="transparent" stroke="none"/></a>`);

    // Band background
    appendSVG(svg, `<rect class="part-band" x="${band.x}" y="${band.y}" width="${band.w}" height="${band.h}" rx="8" ry="8"/>`);

    // Header bar
    appendSVG(svg, `<rect class="part-header-bar" x="${head.x}" y="${head.y}" width="${head.w}" height="${head.h}" rx="8" ry="8" fill="${meta.color}" opacity="0.10"/>`);
    appendSVG(svg, `<rect class="part-stripe" x="${head.x}" y="${head.y}" width="6" height="${head.h}" fill="${meta.color}"/>`);
    appendSVG(svg, `<text class="part-header-text" x="${head.x+18}" y="${head.y+head.h/2}">${escapeXml(meta.label)}</text>`);
    appendSVG(svg, `<text class="part-scope-text" x="${head.x+260}" y="${head.y+head.h/2}">${escapeXml(meta.scope)}</text>`);
  });

  // --- Layer rows ---
  Object.keys(pos).filter(k=>k.startsWith("__layer_")).forEach(k=>{
    const L = pos[k];
    const layer = layerById[L.layerNum];
    const isCrossCutting = L.cross_cutting;
    const isFutureExtending = L.future_extending;
    const isRoadmap = L.is_roadmap;

    // Roadmap layer gets a special background
    if (isRoadmap){
      appendSVG(svg, `<rect class="roadmap-layer-bg" x="${LAYOUT.mainStartX-10}" y="${L.y+4}" width="${LAYOUT.mainEndX-LAYOUT.mainStartX+20}" height="${L.h-4}"/>`);
    }

    appendSVG(svg, `<line class="layer-separator" x1="${LAYOUT.mainStartX-2}" y1="${L.y+L.h}" x2="${LAYOUT.mainEndX}" y2="${L.y+L.h}"/>`);

    const labelClass = `layer-label${isCrossCutting?' cross-cutting':''}`;
    const subClass = `layer-sublabel${isCrossCutting?' cross-cutting':''}`;
    appendSVG(svg, `<text class="${labelClass}" x="${LAYOUT.layerLabelPad}" y="${L.y + L.h/2 - 6}">${escapeXml(L.layerName)}</text>`);
    appendSVG(svg, `<text class="${subClass}" x="${LAYOUT.layerLabelPad}" y="${L.y + L.h/2 + 8}">Layer ${L.layerNum}${isCrossCutting?' · cross-cutting':''}${isRoadmap?' · 🚧 roadmap':''}</text>`);

    if (isFutureExtending){
      appendSVG(svg, `<text class="future-extending-marker" x="${LAYOUT.layerLabelPad}" y="${L.y + L.h/2 + 22}">↳ post-Master extends</text>`);
    }

    // Empty hint when no nodes yet
    const nodeCount = NODES.filter(n=>n.layer===L.layerNum).length;
    if (nodeCount === 0){
      const cx = (LAYOUT.mainStartX + LAYOUT.mainEndX) / 2;
      appendSVG(svg, `<text class="layer-empty-hint" x="${cx}" y="${L.y + L.h/2 + 4}">— layer ${L.layerNum} pending — </text>`);
    }
  });

  // --- Edges (before nodes) ---
  EDGES.forEach((e, idx)=>{
    const s = pos[e.from], t = pos[e.to];
    if(!s || !t) return;
    const path = edgePath(s, t, idx, pos, e.from, e.to);
    appendSVG(svg, `<path class="edge-path flow-${e.flow}" d="${path}" marker-end="url(#arrow-${e.flow})"/>`);
  });

  // --- Nodes ---
  NODES.forEach(n=>{
    const p = pos[n.id]; if(!p) return;
    const partColor = PART_META[n.part].color;
    const fillBg = `rgba(${hexToRgb(partColor)},0.10)`;
    const roadmapClass = n.is_roadmap ? ' roadmap' : '';
    const roadmapIcon = n.is_roadmap ? `<text class="node-roadmap-icon" x="${p.x+p.w-8}" y="${p.y+12}">🚧</text>` : '';
    appendSVG(svg, `
      <g data-node-id="${n.id}" style="cursor:pointer">
        <rect class="node-rect${roadmapClass}" x="${p.x}" y="${p.y}" width="${p.w}" height="${p.h}" fill="${fillBg}" stroke="${partColor}"/>
        <text class="node-id" x="${p.x+8}" y="${p.y+12}">${n.id}</text>
        ${roadmapIcon}
        <text class="node-label" x="${p.x+p.w/2}" y="${p.y+p.h/2 + 8}">${escapeXml(n.label)}</text>
      </g>
    `);
  });

  svg.querySelectorAll("g[data-node-id]").forEach(g=>{
    g.addEventListener("click",()=>showDrawer(g.getAttribute("data-node-id")));
  });

  // --- Legend (sticky at bottom of canvas) ---
  const lgY = pos.__totalH - 60;
  appendSVG(svg, `<rect class="legend-box" x="14" y="${lgY}" width="900" height="40"/>`);
  let lgX = 32;
  const flows = [
    {ft:"control",label:"control"},
    {ft:"data",label:"data"},
    {ft:"analysis",label:"analysis"},
    {ft:"infra",label:"infra"},
    {ft:"safety",label:"safety"},
    {ft:"feedback",label:"feedback"},
    {ft:"report",label:"report"}
  ];
  flows.forEach(f=>{
    appendSVG(svg, `<line x1="${lgX}" y1="${lgY+20}" x2="${lgX+30}" y2="${lgY+20}" class="edge-path flow-${f.ft}" marker-end="url(#arrow-${f.ft})"/>`);
    appendSVG(svg, `<text x="${lgX+38}" y="${lgY+24}" font-size="11" fill="#475569">${f.label}</text>`);
    lgX += 100;
  });

  // Final canvas size
  svg.setAttribute("height", pos.__totalH);
  svg.setAttribute("width",  LAYOUT.canvasW);
  svg.setAttribute("viewBox", `0 0 ${LAYOUT.canvasW} ${pos.__totalH}`);

  // Update progress counter
  const counter = document.getElementById("node-count");
  if (counter) counter.textContent = `${NODES.length} / ~152`;
}

function appendSVG(parent, html){
  const tmp = document.createElementNS("http://www.w3.org/2000/svg","g");
  tmp.innerHTML = html;
  while(tmp.firstChild) parent.appendChild(tmp.firstChild);
}
function getCSS(varName){
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}
function hexToRgb(h){
  h = h.replace("#","");
  return `${parseInt(h.substr(0,2),16)},${parseInt(h.substr(2,2),16)},${parseInt(h.substr(4,2),16)}`;
}
function escapeXml(s){
  return String(s).replace(/[<>&'"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;',"'":'&apos;','"':'&quot;'}[c]));
}

/* =========================================================
   DRAWER (identical to business view; supports future-extending + roadmap)
========================================================= */
function showDrawer(id){
  const n = NODES.find(x=>x.id===id); if(!n) return;
  const drawer = document.getElementById("drawer");
  const main = document.getElementById("main");
  const partColor = PART_META[n.part].color;
  const inbound = EDGES.filter(e=>e.to===id).map(e=>e.from);
  const outbound = EDGES.filter(e=>e.from===id).map(e=>e.to);

  const depsHTML = (n.dependencies||[]).map(d=>`
    <div class="dep">
      <div><span class="dep-type">${escapeXml(d.type)}</span><span class="dep-name">${escapeXml(d.name)}</span></div>
      <div class="dep-reason">${escapeXml(d.reason||"")}</div>
    </div>`).join("");

  const ia = n.internal_architecture||{};
  const compsHTML = (ia.components||[]).map(c=>`
    <div class="internal-component">
      <div class="ic-name">${escapeXml(c.name)}</div>
      <div class="ic-role">${escapeXml(c.role||"")}</div>
    </div>`).join("");
  const flowHTML = (ia.internal_flow||[]).map(f=>`<div class="if-step">${escapeXml(f)}</div>`).join("");

  const futureExtendingHTML = n.future_extending_callout
    ? `<div class="future-extending"><b>Future-extending:</b> ${escapeXml(n.future_extending_callout)}</div>`
    : "";
  const roadmapWarningHTML = n.is_roadmap
    ? `<div class="roadmap-warning">🚧 <b>Post-Master roadmap.</b> No implementation spec yet — placeholder for the architectural arc beyond Master v1.0.</div>`
    : "";

  drawer.classList.remove("empty");
  main.classList.add("drawer-open");
  drawer.innerHTML = `
    <div class="panel-header">
      <button class="close" onclick="closeDrawer()">×</button>
      <span class="layer-pill" style="background:${partColor}">${escapeXml(n.partLabel||PART_META[n.part].label)} · ${escapeXml(n.layerLabel||layerById[n.layer]?.name||'')}</span>
      <h2>${escapeXml(n.label)}</h2>
      <p class="subtitle">${escapeXml(n.purpose||"")}</p>
      <div class="meta"><span>id: ${n.id}</span><span>layer: ${n.layer}</span></div>
    </div>
    <div class="panel-body">
      ${roadmapWarningHTML}
      <section><h3>Why this matters</h3><div class="why">${escapeXml(n.why_matters||"")}</div>${futureExtendingHTML}</section>
      <section><h3>Internal architecture</h3>
        <div class="internal">
          <div class="internal-summary">${escapeXml(ia.summary||"")}</div>
          ${compsHTML?`<div class="internal-components">${compsHTML}</div>`:""}
          ${flowHTML?`<div class="internal-flow">${flowHTML}</div>`:""}
        </div>
      </section>
      <section><h3>What happens</h3><ul>${(n.what_happens||[]).map(s=>`<li>${escapeXml(s)}</li>`).join("")}</ul></section>
      <section><h3>Inputs</h3><ul>${(n.inputs||[]).map(s=>`<li>${escapeXml(s)}</li>`).join("")}</ul></section>
      <section><h3>Outputs</h3><ul>${(n.outputs||[]).map(s=>`<li>${escapeXml(s)}</li>`).join("")}</ul></section>
      <section><h3>Dependencies</h3>${depsHTML?`<div class="deps">${depsHTML}</div>`:"<p style='color:var(--muted);font-size:12px'>None.</p>"}</section>
      <section><h3>Real example</h3><div class="example">${escapeXml(n.example||"")}</div></section>
      ${(inbound.length||outbound.length)?`<section><h3>Connected components</h3><div class="connected">
        ${inbound.map(i=>`<button onclick="showDrawer('${i}')">← ${escapeXml(NODES.find(x=>x.id===i)?.label||i)}</button>`).join("")}
        ${outbound.map(o=>`<button onclick="showDrawer('${o}')">${escapeXml(NODES.find(x=>x.id===o)?.label||o)} →</button>`).join("")}
      </div></section>`:""}
      <section><h3>Source specs</h3><div class="source-files">${(n.source_files||[]).map(f=>`<code>${escapeXml(f)}</code>`).join("")||"<p style='color:var(--muted);font-size:12px'>(none)</p>"}</div></section>
    </div>`;
  drawer.scrollTop = 0;
}
function closeDrawer(){
  document.getElementById("drawer").classList.add("empty");
  document.getElementById("main").classList.remove("drawer-open");
  document.getElementById("drawer").innerHTML = `<div class="placeholder"><div style="font-weight:500;color:#0f172a">Click any node</div><div style="font-size:12.5px;margin-top:4px">Drawer schema is identical to the business view.</div></div>`;
}
document.addEventListener("keydown",e=>{
  if(e.key==="Escape") closeDrawer();
  if(e.key==="/"){const s=document.getElementById("search");if(document.activeElement!==s){e.preventDefault();s.focus()}}
});
document.getElementById("search").addEventListener("input",e=>{
  const q = e.target.value.toLowerCase().trim();
  if(!q) return;
  const hit = NODES.find(n=>n.label.toLowerCase().includes(q) || n.id.toLowerCase()===q);
  if(hit) showDrawer(hit.id);
});

render();
</script>
</body>
